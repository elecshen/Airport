apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: airport-platform
  labels:
    app: identity-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Migration initContainer
      initContainers:
        - name: run-migrations
          image: airport-identity-service:latest
          command: ["dotnet", "Airport.Identity.dll", "--migrate"]
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "identity"
      
      containers:
        - name: identity-service
          image: airport-identity-service:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "identity"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OTEL_SERVICE_NAME
              value: "identity-service"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
