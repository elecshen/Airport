apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: airport-platform
  labels:
    app: admin-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: run-migrations
          image: airport-admin-service:latest
          command: ["dotnet", "Airport.Admin.dll", "--migrate"]
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "admin"
      
      containers:
        - name: admin-service
          image: airport-admin-service:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "admin"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OTEL_SERVICE_NAME
              value: "admin-service"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
