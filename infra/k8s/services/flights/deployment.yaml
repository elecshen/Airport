apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: airport-platform
  labels:
    app: flight-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: run-migrations
          image: airport-flight-service:latest
          command: ["/app/flight-service", "-migrate"]
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "flights"
      
      containers:
        - name: flight-service
          image: airport-flight-service:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-credentials
          env:
            - name: DB_SCHEMA
              value: "flights"
            - name: OTEL_SERVICE_NAME
              value: "flight-service"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      restartPolicy: Always
