apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: airport-platform
data:
  # Database connection strings (passwords should be in Vault)
  DB_HOST: "postgres.airport-platform.svc.cluster.local"
  DB_PORT: "5432"
  
  # Consul configuration
  CONSUL_HTTP_ADDR: "http://consul.airport-platform.svc.cluster.local:8500"
  
  # OpenTelemetry collector endpoint
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.airport-platform.svc.cluster.local:4317"
  
  # Service URLs for internal communication
  IDENTITY_SERVICE_URL: "http://identity-service.airport-platform.svc.cluster.local:8080"
  FLIGHT_SERVICE_URL: "http://flight-service.airport-platform.svc.cluster.local:8080"
  BOOKING_SERVICE_URL: "http://booking-service.airport-platform.svc.cluster.local:8080"
  ADMIN_SERVICE_URL: "http://admin-service.airport-platform.svc.cluster.local:8080"
