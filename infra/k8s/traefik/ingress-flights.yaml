apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-ingress
  namespace: airport-platform
spec:
  entryPoints:
    - web
  routes:
    # Health checks - no auth required
    - match: PathPrefix(`/api/flights/health`)
      kind: Rule
      services:
        - name: flight-service
          port: 8080
      middlewares:
        - name: strip-prefix-middleware
    
    # All flight endpoints require authentication
    - match: PathPrefix(`/api/flights`)
      kind: Rule
      services:
        - name: flight-service
          port: 8080
      middlewares:
        - name: protected-api-chain
