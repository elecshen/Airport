apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: identity-ingress
  namespace: airport-platform
spec:
  entryPoints:
    - web
  routes:
    # Public endpoints (login, register) - no auth required
    - match: PathPrefix(`/api/auth/login`) || PathPrefix(`/api/auth/register`)
      kind: Rule
      services:
        - name: identity-service
          port: 8080
      middlewares:
        - name: cors-middleware
        - name: rate-limit-middleware
        - name: strip-prefix-middleware
    
    # Health checks - no auth required
    - match: PathPrefix(`/api/health`)
      kind: Rule
      services:
        - name: identity-service
          port: 8080
      middlewares:
        - name: strip-prefix-middleware
    
    # Protected endpoints - require authentication
    - match: PathPrefix(`/api/auth`)
      kind: Rule
      services:
        - name: identity-service
          port: 8080
      middlewares:
        - name: protected-api-chain
